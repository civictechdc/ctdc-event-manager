name: Release

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t event-publisher:${{ github.event.release.tag_name }} .
          docker tag event-publisher:${{ github.event.release.tag_name }} event-publisher:latest

      - name: Push to GitHub Container Registry
        run: |
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          docker tag event-publisher:${{ github.event.release.tag_name }} ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          docker tag event-publisher:latest ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Create release artifact
        run: |
          tar -czf event-publisher-${{ github.event.release.tag_name }}.tar.gz dist/ package.json README.md
          zip -r event-publisher-${{ github.event.release.tag_name }}.zip dist/ package.json README.md

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            event-publisher-${{ github.event.release.tag_name }}.tar.gz
            event-publisher-${{ github.event.release.tag_name }}.zip
